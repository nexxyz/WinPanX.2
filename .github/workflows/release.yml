name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate Installer Architecture Flag
      run: |
        $content = Get-Content installer/WinPanX2.iss -Raw
        if ($content -notmatch 'ArchitecturesInstallIn64BitMode=\{#ArchFlag\}') {
          Write-Error "Installer must use preprocessor ArchFlag."
          exit 1
        }
        if ($content -notmatch '#define ArchFlag "x64compatible"') {
          Write-Error "ArchFlag must be set to x64compatible."
          exit 1
        }
      shell: powershell

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - run: dotnet restore
    - run: dotnet build --configuration Release --no-restore

    - name: Install lizard (complexity)
      run: python -m pip install --disable-pip-version-check --no-cache-dir lizard

    - name: Quality report (LOC + complexity)
      run: |
        mkdir -p _logs
        python tools/quality_report.py --md _logs/quality-report.md --lizard-csv _logs/lizard.csv
        cat _logs/quality-report.md >> "$GITHUB_STEP_SUMMARY"
      shell: bash
    - run: dotnet publish src/WinPanX2/WinPanX2.csproj -c Release -r win-x64 --self-contained true

    - name: Install Inno Setup
      run: choco install innosetup --yes

    - name: Compile Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\WinPanX2.iss
      shell: powershell

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: installer/Output/WinPanX2-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload quality artifacts
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: |
          _logs/quality-report.md
          _logs/lizard.csv
